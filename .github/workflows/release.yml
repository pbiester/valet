name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create, e.g. v0.1.0'
        required: true

permissions:
  contents: write        # create the GitHub Release and upload the jar asset

jobs:
  release:
    name: build jar + publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4

      - name: Resolve version from tag
        id: v
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}"   >> "$GITHUB_OUTPUT"

      # Runs the unit tests and builds the shaded bundle jar named for the release version
      # (e.g. valet-bundle-0.1.0.jar). Integration tests are not run here (they need Docker
      # and a controller) — CI already covers them on the source commit.
      - name: Build and test
        run: ./gradlew build -Pvalet.version=${{ steps.v.outputs.version }}

      - name: Locate the bundle jar
        id: jar
        run: echo "path=$(ls bundle/build/libs/valet-bundle-*.jar)" >> "$GITHUB_OUTPUT"

      - name: Create release and attach the bundle jar
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE=
          case "${{ steps.v.outputs.version }}" in *-*) PRERELEASE=--prerelease ;; esac
          gh release create "${{ steps.v.outputs.tag }}" \
            --title "Valet ${{ steps.v.outputs.tag }}" \
            --generate-notes \
            $PRERELEASE \
            "${{ steps.jar.outputs.path }}"
